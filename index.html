<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Military Terminal Dashboard</title>
    <style>
        /* Optional basic styling to make it look clean */
        body {
            font-family: monospace;
            background-color: #0d1117;
            color: #58a6ff;
            margin: 0;
            padding: 20px;
        }
        #hero-img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border: 2px solid #58a6ff;
            border-radius: 6px;
        }
        nav {
            margin: 20px 0;
            font-size: 1.2rem;
        }
        nav a {
            color: #58a6ff;
            text-decoration: none;
            padding: 0 10px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        #gallery-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .gallery-thumb {
            width: 400px;
            height: 300px;
            object-fit: cover;
            border: 2px solid #30363d;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <img id="hero-img" src="" alt="Terminal Hero Banner">
    
    <nav id="nav-links"></nav>

    <div id="gallery-container"></div>

    <script>
        // 1. Data Object (Replaces Vue's data logic)
        const siteData = {
            heroImage: "https://picsum.photos/1600/400?grayscale", // Using a clean grayscale banner
            pages: [
                { label: "Page 1", href: "page1.html" },
                { label: "Page 2", href: "page2.html" },
                { label: "Page 3", href: "page3.html" }
            ],
            gallery: [], // Populated dynamically below
            studentID: "",
            hashCode: ""
        };

        // 2. Helper function to get 3 unique random images
        function fetchRandomImages() {
            const urls = [];
            for (let i = 0; i < 3; i++) {
                // Generates a unique seed number so the browser doesn't cache the same image
                const randomSeed = Math.floor(Math.random() * 5000) + i; 
                urls.push(`https://picsum.photos/400/300?random=${randomSeed}`);
            }
            return urls;
        }

        // 3. Render Function (Replaces Vue's reactive rendering)
        function initializeApp() {
            // Assign the random images to our data object
            siteData.gallery = fetchRandomImages();

            // Set Hero Image
            document.getElementById("hero-img").src = siteData.heroImage;

            // Build Navigation Links dynamically
            const navElement = document.getElementById("nav-links");
            navElement.innerHTML = siteData.pages
                .map((page, index) => {
                    const link = `<a href="${page.href}">${page.label}</a>`;
                    // Add a separator pipe between links, but not after the last one
                    return index < siteData.pages.length - 1 ? `${link} | ` : link;
                })
                .join("");

            // Build Gallery Images dynamically
            const galleryElement = document.getElementById("gallery-container");
            galleryElement.innerHTML = siteData.gallery
                .map(imageUrl => `<img class="gallery-thumb" src="${imageUrl}" alt="Random Tech Gallery Image">`)
                .join("");
        }

        // Initialize the app once the HTML elements are fully ready
        document.addEventListener("DOMContentLoaded", initializeApp);
    </script>
</body>
</html>
